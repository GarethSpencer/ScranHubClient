<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="256x256" href="/favicon.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      ScranHub - Plan and rate your scranning adventures with friends
    </title>
    <meta
      name="description"
      content="Plan and rate your scranning adventures with your friends! Form a group, rate everywhere you eat together and see what comes out on top."
    />
    <meta name="author" content="Gareth Spencer" />
    <meta property="og:site_name" content="ScranHub" />
    <meta property="og:title" content="Let's get scranning!" />
    <meta
      property="og:description"
      content="Plan and rate your scranning adventures with your friends. Form a group, rate everywhere you eat together and see what comes out on top. This site is open source, check out the footer for GitHub links to the backend and frontend code."
    />
    <meta
      property="og:image"
      content="https://www.scranhub.uk/site-preview.jpg"
    />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_GB" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.scranhub.uk" />
    <link rel="canonical" href="https://www.scranhub.uk" />
    <meta name="twitter:card" content="summary_large_image" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "ScranHub",
        "url": "https://www.scranhub.uk"
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "ScranHub",
        "url": "https://www.scranhub.uk",
        "logo": "https://www.scranhub.uk/favicon.png",
        "sameAs": [
          "https://github.com/GarethSpencer/ScranHub",
          "https://github.com/GarethSpencer/ScranHubClient"
        ]
      }
    </script>
    <style>
      .crawler-fallback {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip-path: inset(50%);
      }
    </style>
    <script>
      (function () {
        var stored = localStorage.getItem("darkMode");
        var dark =
          stored !== null
            ? stored === "true"
            : window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.setAttribute(
          "data-bs-theme",
          dark ? "dark" : "light",
        );
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <!--Static fallback content for crawlers and no-JS visitors-->
      <h1 class="crawler-fallback">
        ScranHub — plan and rate your scranning adventures with friends
      </h1>
      <p class="crawler-fallback">
        Form a group, rate everywhere you eat together and see what comes out on
        top.
      </p>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
