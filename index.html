<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScranHub</title>
    <meta
      name="description"
      content="Plan and rate your scranning adventures with your friends! Form a group, rate everywhere you eat together and see what comes out on top."
    />
    <meta
      property="og:title"
      content="Plan and rate your scranning adventures with your friends!"
    />
    <meta
      property="og:description"
      content="Form a group, rate everywhere you eat together and see what comes out on top. This site is open source, check out the footer for GitHub links to the backend and frontend code."
    />
    <meta
      property="og:image"
      content="https://www.scranhub.uk/site-background_small.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_GB" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.scranhub.uk" />
    <link rel="canonical" href="https://www.scranhub.uk" />
    <meta name="twitter:card" content="summary_large_image" />
    <script>
      (function () {
        var stored = localStorage.getItem("darkMode");
        var dark =
          stored !== null
            ? stored === "true"
            : window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.setAttribute(
          "data-bs-theme",
          dark ? "dark" : "light",
        );
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
